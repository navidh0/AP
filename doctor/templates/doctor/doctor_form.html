{% extends "base.html" %}

{% block content %}
<div class="container mx-auto p-4">
    <div class="bg-white rounded-lg shadow p-6 max-w-lg mx-auto">
        <h1 class="text-2xl font-bold mb-4">Add a New Doctor</h1>
        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-4">  {{ field.label_tag }}

                    {{ field }}

                    {% if field.errors %}
                        <div class="text-red-500 text-sm mt-1">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4">
                Save Doctor
            </button>
        </form>
    </div>
</div>
{% endblock %}
