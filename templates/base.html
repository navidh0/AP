{% load tailwind_tags %}
{% load static %}

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon" />
    {% tailwind_css %}
  </head>

  <body class="bg-background min-h-screen min-w-[300px] flex flex-col font-sans">
    <header class="bg-surface shadow-sm border-b border-neutral-200 sticky top-0 z-50">
      {% include 'navbar.html' %}
    </header>

    <main class="flex-1 flex flex-col p-5">
      {% block content %}{% endblock %}
    </main>

    <footer class="mt-auto bg-neutral-800 text-neutral-300 border-t border-neutral-700 text-center p-5">
      {% include 'footer.html' %}
    </footer>
    
    {% block scripts %}
      <script src="{% static 'js/navbar.js' %}" defer></script>
    {% endblock %}
  </body>
</html>
