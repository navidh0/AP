{% extends "base.html" %}
{% block title %}Error - MediCare{% endblock %}

{% block content %}
<div class="bg-gradient-to-br from-primary-50 to-secondary-50 py-12 px-4 flex items-center justify-center">
    <div class="max-w-md w-full">

        <!-- Card -->
        <div class="bg-surface rounded-2xl shadow-md p-8 text-center space-y-6">

            <!-- Error Icon -->
            <div class="flex justify-center">
                <svg class="w-12 h-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>

            <!-- Title -->
            <h2 class="text-2xl sm:text-3xl font-bold text-red-600">
                {{ error_title }}
            </h2>

            <!-- Message -->
            <p class="text-sm text-neutral-600">
                {{ error_message }}
            </p>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                {% if show_resend %}
                    <a href="{% url 'users:resend_activation' %}"
                       class="px-6 py-3 rounded-xl bg-primary-600 text-white font-medium 
                              hover:bg-primary-700 focus:outline-none focus:ring-2 
                              focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                        Resend Activation Email
                    </a>
                {% endif %}

                <a href="{% url 'users:retry_signup' %}"
                   class="px-6 py-3 rounded-xl border border-neutral-300 text-neutral-700 
                          hover:bg-neutral-50 transition-colors">
                    Change Email
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
