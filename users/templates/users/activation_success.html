{% extends "base.html" %}
{% block title %}Account Activated - MediCare{% endblock %}

{% block content %}
<div class="bg-gradient-to-br from-primary-50 to-secondary-50 py-12 px-4 flex items-center justify-center">
    <div class="max-w-md w-full">

        <!-- Card -->
        <div class="bg-surface rounded-2xl shadow-md p-8 text-center space-y-6">
            
            <!-- Success Icon -->
            <div class="flex justify-center">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>

            <!-- Header -->
            <h2 class="text-2xl sm:text-3xl font-bold text-green-600">
                Account Activated 🎉
            </h2>
            
            <!-- Message -->
            <p class="text-sm text-neutral-600">
                Your account has been successfully activated.  
                You can now log in and start using MediCare.
            </p>

            <!-- Action Button -->
            <div>
                <a href="{% url 'users:login' %}" 
                   class="px-6 py-3 rounded-xl bg-primary-600 text-white font-medium 
                          hover:bg-primary-700 focus:outline-none focus:ring-2 
                          focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                    Go to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
