{% extends "base.html" %}
{% block title %}Password Reset Complete - MediCare{% endblock %}

{% block content %}
<div class="bg-gradient-to-br from-primary-50 to-secondary-50 py-8 px-4 flex items-center justify-center">
    <div class="max-w-md w-full space-y-8">

        <!-- Header -->
        <div class="text-center">
            <h2 class="mt-6 text-2xl sm:text-3xl font-bold text-neutral-900">
                Password Reset Complete
            </h2>
            <p class="mt-2 text-sm text-neutral-600">
                Your password has been successfully updated.
            </p>
        </div>

        <!-- Success Container -->
        <div class="bg-surface rounded-2xl shadow-md p-8 text-center">
            <div class="flex justify-center mb-4">
                <!-- Success Checkmark Icon -->
                <svg class="w-12 h-12 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <p class="text-neutral-700 mb-6">
                You can now log in using your new password.
            </p>
            <div class="flex justify-center">
                <a href="{% url 'users:login' %}"
                   class="px-6 py-3 bg-primary-600 text-white font-medium rounded-xl 
                          hover:bg-primary-700 transition-colors">
                    Go to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
